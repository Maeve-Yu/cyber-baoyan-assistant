<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="760" fill="#F6F8FC"/>
  <rect x="240" y="70" width="720" height="620" rx="24" fill="white"/>
  <rect x="240" y="70" width="720" height="620" rx="24" stroke="#E4EAF3"/>
  <text x="288" y="126" font-family="Arial, sans-serif" font-size="24" font-weight="800" fill="#0F172A">数据与提醒</text>
  <text x="288" y="156" font-family="Arial, sans-serif" font-size="14" fill="#64748B">管理本地存储、备份和浏览器提醒。所有数据默认只保存在当前浏览器中。</text>
  <g transform="translate(288 190)">
    <rect width="300" height="112" rx="14" fill="#FFF7ED" stroke="#FED7AA"/>
    <text x="18" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#64748B">备份状态</text>
    <text x="18" y="60" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#0F172A">还没有导出过备份</text>
    <text x="18" y="88" font-family="Arial, sans-serif" font-size="12" fill="#64748B">建议至少每 7 天导出一次 JSON 备份。</text>
  </g>
  <g transform="translate(612 190)">
    <rect width="300" height="112" rx="14" fill="#F7FFFB" stroke="#BBF7D0"/>
    <text x="18" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#64748B">本地存储</text>
    <text x="18" y="60" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#0F172A">localStorage + IndexedDB</text>
    <text x="18" y="88" font-family="Arial, sans-serif" font-size="12" fill="#64748B">数据保存在当前浏览器，清缓存前请导出备份。</text>
  </g>
  <g transform="translate(288 322)">
    <rect width="300" height="112" rx="14" fill="#F8FAFC" stroke="#E4EAF3"/>
    <text x="18" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#64748B">提醒状态</text>
    <text x="18" y="60" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#0F172A">浏览器通知授权</text>
    <text x="18" y="88" font-family="Arial, sans-serif" font-size="12" fill="#64748B">网页打开时检查今日节点。</text>
  </g>
  <g transform="translate(612 322)">
    <rect width="300" height="112" rx="14" fill="#F8FAFC" stroke="#E4EAF3"/>
    <text x="18" y="30" font-family="Arial, sans-serif" font-size="12" font-weight="800" fill="#64748B">近期节点</text>
    <text x="18" y="60" font-family="Arial, sans-serif" font-size="17" font-weight="900" fill="#0F172A">3 个待关注</text>
    <text x="18" y="88" font-family="Arial, sans-serif" font-size="12" fill="#64748B">申请截止、复试材料、最终结果自动汇总。</text>
  </g>
  <rect x="288" y="464" width="624" height="72" rx="14" fill="white" stroke="#E4EAF3"/>
  <text x="312" y="494" font-family="Arial, sans-serif" font-size="15" font-weight="800" fill="#0F172A">备份提醒</text>
  <text x="312" y="516" font-family="Arial, sans-serif" font-size="12" fill="#64748B">超过指定天数未导出备份时，在页面中提醒你。</text>
  <rect x="790" y="482" width="96" height="36" rx="10" fill="white" stroke="#D6E0EF"/>
  <text x="838" y="505" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#475569">每 7 天</text>
  <rect x="288" y="556" width="150" height="40" rx="10" fill="#2563EB"/>
  <text x="363" y="581" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="white">立即导出备份</text>
  <rect x="452" y="556" width="130" height="40" rx="10" fill="white" stroke="#D6E0EF"/>
  <text x="517" y="581" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#1E3A8A">复制备份文本</text>
  <rect x="596" y="556" width="110" height="40" rx="10" fill="white" stroke="#D6E0EF"/>
  <text x="651" y="581" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="800" fill="#1E3A8A">导入备份</text>
</svg>
